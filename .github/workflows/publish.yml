name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-test-pack:
    name: Build, Test and Pack
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.slnx') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore QueueTi.slnx

      - name: Build solution
        run: dotnet build QueueTi.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test QueueTi.Client.Tests/ --configuration Release --no-build --logger trx

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: '**/TestResults/**/*.trx'
          retention-days: 7

      - name: Resolve version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          dotnet pack QueueTi.Client/ --configuration Release --no-build --no-restore -p:Version=$VERSION --output ./nupkg
          dotnet pack QueueTi.Aspire.Hosting/ --configuration Release --no-build --no-restore -p:Version=$VERSION --output ./nupkg
          dotnet pack QueueTi.Client.Aspire/ --configuration Release --no-build --no-restore -p:Version=$VERSION --output ./nupkg

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: nupkg
          path: ./nupkg/*.nupkg
          retention-days: 1

  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build-test-pack

    permissions:
      contents: read

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v7
        with:
          name: nupkg
          path: ./nupkg

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish to NuGet
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
